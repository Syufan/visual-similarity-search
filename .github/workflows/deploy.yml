name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install fastapi python-multipart Pillow pydantic

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t visual-similarity-search:${{ github.sha }} .

      - name: Smoke test container health endpoint
        run: |
          docker run -d --name app \
            -e TESTING=1 \
            -p 8000:8000 \
            visual-similarity-search:${{ github.sha }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for server... ($i/15)"
            sleep 2
          done
          curl --fail http://localhost:8000/health || (docker logs app && exit 1)
          docker stop app

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          # Fresh repo — avoids pushing binary file history to HF Spaces
          mkdir hf_deploy
          rsync -av --exclude='.git' \
            --exclude='result/gallery.index' \
            --exclude='result/gallery_embeddings.npy' \
            --exclude='result/best_clip_deploy.pt' \
            --exclude='result/data' \
            --exclude='data/train' \
            --exclude='data/test' \
            . hf_deploy/
          cd hf_deploy
          git init
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git checkout -b main
          git add .
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/visual-similarity-search
          git push hf main:main --force
